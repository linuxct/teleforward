name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Write keystore.properties
        run: |
          printf 'storeFile=keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.KEYSTORE_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}"          \
            "${{ secrets.KEY_PASSWORD }}"        \
            > keystore.properties

      - name: Read version
        id: ver
        run: |
          VN=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          VC=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
          echo "name=$VN" >> "$GITHUB_OUTPUT"
          echo "code=$VC" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/teleforward-${{ steps.ver.outputs.name }}.apk

      - name: Build release notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## Changes"
            if [ -z "$PREV" ]; then
              echo "- Initial version"
            else
              git log --pretty=format:"- %s" "${PREV}..HEAD"
            fi
          } > /tmp/release_notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.name }}" \
            --title "TeleForward ${{ steps.ver.outputs.name }}" \
            --notes-file /tmp/release_notes.md \
            "app/build/outputs/apk/release/teleforward-${{ steps.ver.outputs.name }}.apk"